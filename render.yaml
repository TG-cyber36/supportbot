services:
  - type: web
    name: telegram-support-bot
    runtime: python
    plan: free
    region: frankfurt
    pythonVersion: 3.11.0  # Добавить эту строку
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /healthcheck
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
