services:
  - type: web                          # Меняем worker на web
    name: telegram-support-bot
    runtime: python
    plan: free                          # Бесплатный план
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /healthcheck       # Обязательно для web service
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
