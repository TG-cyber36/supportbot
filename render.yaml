# Основной сервис бота (worker)
- type: worker
  name: telegram-support-bot
  runtime: python
  plan: free  # free работает для worker
  buildCommand: pip install -r requirements.txt
  startCommand: python bot.py
  envVars:
    - key: BOT_TOKEN
      sync: false
    - key: ADMIN_CHAT_ID
      sync: false

# Сервис для пинга (используем worker вместо cron)
- type: worker
  name: bot-pinger
  runtime: python
  plan: free
  buildCommand: pip install requests
  startCommand: python keep_alive.py
  envVars:
    - key: BOT_TOKEN
      sync: false
