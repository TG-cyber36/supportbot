services:
  - type: worker
    name: telegram-support-bot
    runtime: python
    plan: free
    region: frankfurt  # или frankfurt, singapore, ohio
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
