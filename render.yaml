services:
  # Основной сервис бота
  - type: worker
    name: telegram-support-bot
    runtime: python
    repo: https://github.com/ВАШ_АККАУНТ/ВАШ_РЕПОЗИТОРИЙ
    plan: free
    region: frankfurt  # или singapore, ohio и т.д.
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
    healthCheckPath: /
    autoDeploy: true
    
  # Сервис для пинга (отдельный экземпляр для надежности)
  - type: cron
    name: bot-pinger
    runtime: python
    plan: free
    region: frankfurt
    schedule: "*/5 * * * *"  # Каждые 5 минут
    buildCommand: pip install requests
    startCommand: python keep_alive.py
    envVars:
      - key: BOT_TOKEN
        sync: false
